services:
  vitalis-postgres:
    container_name: vitalis-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-vitalis}
      POSTGRES_USER: ${DATABASE_USER:-vitalis_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-vitalis_user} -d ${DATABASE_NAME:-vitalis}"]
      interval: 5s
      timeout: 5s
      retries: 10

  vitalis-redis:
    container_name: vitalis-redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  vitalis:
    container_name: vitalis
    image: yourmomahegao/vitalis:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_ADDRESS: vitalis-postgres
      DATABASE_PORT: 5432
      REDIS_ADDRESS: vitalis-redis
      REDIS_PORT: 6379
    volumes:
      - ./.env:/app/.env
    ports:
      - "8080:8080"
    depends_on:
      vitalis-postgres:
        condition: service_healthy
      vitalis-redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
